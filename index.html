<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#1A1033">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="mobile-web-app-capable" content="yes">
<title>AltoLiv</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='%232D1B5C'/%3E%3Cpath d='M50 20l8.5 19.5L80 42l-15 14 4 21L50 67l-19 10 4-21-15-14 21.5-2.5z' fill='%23FFE9B5'/%3E%3C/svg%3E">
<style>
  *,*::before,*::after{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;overflow-x:hidden;}
  html{height:100%;}
  body{
    min-height:100vh;
    min-height:100dvh;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",sans-serif;
    color:#fff;
    background:#1A1033;
    background-image:linear-gradient(180deg,#1A1033 0%,#2D1B5C 50%,#5B3DA8 100%);
    background-attachment:fixed;
    user-select:none;
    -webkit-user-select:none;
    overflow-y:auto;
  }
  body::before{
    content:"";
    position:fixed;
    top:-100px;right:-80px;
    width:280px;height:280px;
    background:radial-gradient(circle,rgba(255,180,80,.35) 0%,transparent 60%);
    pointer-events:none;z-index:0;
  }
  body::after{
    content:"";
    position:fixed;
    bottom:-120px;left:-100px;
    width:320px;height:320px;
    background:radial-gradient(circle,rgba(120,80,255,.4) 0%,transparent 60%);
    pointer-events:none;z-index:0;
  }
  .app{
    position:relative;z-index:1;
    max-width:440px;margin:0 auto;
    padding:max(10px,env(safe-area-inset-top)) 14px max(12px,env(safe-area-inset-bottom));
    min-height:100vh;min-height:100dvh;
  }
  .glass{
    background:rgba(255,255,255,.08);
    backdrop-filter:blur(18px);
    -webkit-backdrop-filter:blur(18px);
    border:1px solid rgba(255,255,255,.14);
    border-radius:18px;
  }
  .h1{font-size:32px;font-weight:700;letter-spacing:-0.5px;margin:0;}
  .h2{font-size:24px;font-weight:700;letter-spacing:-0.3px;margin:0;}
  .label-tiny{font-size:11px;color:rgba(255,255,255,.5);font-weight:600;letter-spacing:0.7px;text-transform:uppercase;}
  .text-sec{color:rgba(255,255,255,.7);font-size:14px;}
  .text-mut{color:rgba(255,255,255,.5);font-size:13px;}
  .text-faint{color:rgba(255,255,255,.4);font-size:11px;font-weight:500;}

  .btn-primary{
    display:flex;align-items:center;justify-content:center;gap:8px;
    width:100%;padding:14px 18px;
    background:linear-gradient(135deg,#FFB347 0%,#FF7A5C 100%);
    border:none;border-radius:16px;
    font:700 15px inherit;color:#fff;
    cursor:pointer;
    box-shadow:0 6px 16px rgba(255,122,92,.35);
    transition:transform .1s;
  }
  .btn-primary:active{transform:scale(.97);}
  .btn-xl{
    padding:17px 18px;
    font:800 17px inherit;
    letter-spacing:0.2px;
  }
  .btn-xl span:last-child{font-size:18px;}
  .btn-secondary{
    display:flex;align-items:center;justify-content:center;gap:6px;
    padding:14px 16px;
    background:rgba(255,255,255,.1);
    backdrop-filter:blur(18px);
    -webkit-backdrop-filter:blur(18px);
    border:1px solid rgba(255,255,255,.18);
    border-radius:16px;
    font:700 14px inherit;color:#fff;
    cursor:pointer;
    transition:transform .1s, background .15s;
    flex-shrink:0;
  }
  .btn-secondary:active{transform:scale(.97);background:rgba(255,255,255,.16);}
  .cta-row{display:flex;gap:8px;align-items:stretch;}
  .cta-row .btn-primary{flex:1;}
  .btn-text{background:none;border:none;color:rgba(255,255,255,.5);font:500 13px inherit;padding:8px;cursor:pointer;}

  .input{
    width:100%;
    background:rgba(255,255,255,.08);
    backdrop-filter:blur(18px);
    -webkit-backdrop-filter:blur(18px);
    border:1px solid rgba(255,255,255,.14);
    border-radius:18px;
    padding:14px 16px;
    color:#fff;font:500 16px inherit;
    outline:none;
  }
  .input::placeholder{color:rgba(255,255,255,.3);}
  .input:focus{border-color:#FFB347;}

  .pick-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  .pick{
    background:rgba(255,255,255,.08);
    backdrop-filter:blur(18px);
    -webkit-backdrop-filter:blur(18px);
    border:1px solid rgba(255,255,255,.14);
    border-radius:20px;
    padding:18px 8px;
    text-align:center;cursor:pointer;
    transition:all .18s;
  }
  .pick.selected{
    background:rgba(255,179,71,.18);
    border:2px solid #FFB347;
    box-shadow:0 0 16px rgba(255,179,71,.3);
  }
  .pick.selected.teal{
    background:rgba(93,202,165,.18);
    border-color:#5DCAA5;
    box-shadow:0 0 16px rgba(93,202,165,.3);
  }
  .pick-emoji{font-size:48px;line-height:1;}
  .pick-label{font-size:14px;font-weight:600;color:#fff;margin-top:8px;}
  .pick-desc{font-size:11px;color:rgba(255,255,255,.5);margin-top:2px;}

  .top-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
  .day-chip{
    display:inline-flex;align-items:center;gap:6px;
    background:rgba(255,255,255,.08);
    backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);
    border:1px solid rgba(255,255,255,.14);
    border-radius:14px;
    padding:7px 12px;
    font-size:12px;font-weight:600;color:#fff;letter-spacing:0.3px;
  }
  .day-chip svg{width:13px;height:13px;}

  .meter-card{
    padding:14px 16px 12px;margin-bottom:10px;
    background:linear-gradient(135deg,rgba(255,255,255,.14) 0%,rgba(255,255,255,.06) 100%);
    border:1.5px solid rgba(255,255,255,.22);
    box-shadow:0 6px 20px rgba(0,0,0,.25), inset 0 1px 0 rgba(255,255,255,.12);
  }
  .meter-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
  .meter-status{display:flex;align-items:center;gap:7px;font-size:15px;font-weight:700;color:#fff;letter-spacing:-0.1px;}
  .meter-dot{width:9px;height:9px;border-radius:50%;}
  .meter-track{
    position:relative;height:22px;
    background:rgba(0,0,0,.4);
    border-radius:8px;overflow:hidden;
    border:1px solid rgba(255,255,255,.12);
  }
  .meter-track::after{
    content:"";position:absolute;inset:0;
    background:linear-gradient(90deg,#FF3B47 0%,#FF9D2E 25%,rgba(255,255,255,.25) 50%,#5FE07A 75%,#00C77C 100%);
    opacity:.42;
  }
  .meter-needle{
    position:absolute;top:-3px;width:4px;height:28px;
    background:#fff;border-radius:3px;
    box-shadow:0 0 12px rgba(255,255,255,.85), 0 0 4px rgba(255,255,255,1);
    transition:left .55s cubic-bezier(.34,1.56,.64,1);
    z-index:2;
  }
  .meter-foot{display:flex;justify-content:space-between;margin-top:6px;}

  .progress{display:flex;gap:3px;margin-bottom:10px;}
  .pdot{flex:1;height:4px;border-radius:2px;background:rgba(255,255,255,.15);transition:background .3s;}
  .pdot.done{background:#7CC576;}
  .pdot.now{background:#FFB347;}

  .stats{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:10px;}
  .stat{
    background:rgba(255,255,255,.08);
    backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);
    border:1px solid rgba(255,255,255,.14);
    border-radius:12px;
    padding:7px 4px;text-align:center;
  }
  .stat-icon{font-size:16px;line-height:1;}
  .stat-val{font-size:13px;font-weight:600;color:#fff;margin-top:2px;}
  .stat-lbl{font-size:9px;color:rgba(255,255,255,.4);font-weight:500;letter-spacing:0.4px;text-transform:uppercase;margin-top:1px;}

  .scene{
    position:relative;
    background:linear-gradient(135deg,rgba(255,255,255,.16) 0%,rgba(255,255,255,.04) 100%);
    backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);
    border:1px solid rgba(255,255,255,.14);
    border-radius:20px;
    padding:12px 14px 14px;text-align:center;
    margin-bottom:10px;overflow:hidden;
  }
  .scene::before{
    content:"";position:absolute;
    top:-30px;right:-30px;
    width:130px;height:130px;border-radius:50%;
    background:radial-gradient(circle,rgba(255,180,80,.28) 0%,transparent 70%);
  }
  .scene-inner{position:relative;}
  .scene-time{
    font-size:14px;font-weight:700;color:#FFB347;
    letter-spacing:0.4px;text-transform:uppercase;
    margin-bottom:6px;
    text-shadow:0 1px 8px rgba(255,179,71,.4);
  }
  .scene-time .time-clock{color:#fff;opacity:.85;font-weight:600;margin-right:6px;}
  .avatar-ring{
    display:inline-block;padding:3px;
    background:linear-gradient(135deg,#FFB347,#FF7A5C);
    border-radius:50%;
    box-shadow:0 0 16px rgba(255,122,92,.4);
  }
  .avatar{
    width:48px;height:48px;
    background:#fff;border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    font-size:28px;line-height:1;
  }
  .scene-title{font-size:17px;font-weight:700;color:#fff;margin:8px 0 2px;line-height:1.2;}
  .scene-desc{font-size:13px;color:rgba(255,255,255,.7);line-height:1.35;margin:0;}

  .choice{
    display:flex;align-items:center;gap:11px;
    background:rgba(255,255,255,.08);
    backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);
    border:1px solid rgba(255,255,255,.14);
    border-radius:14px;
    padding:9px 11px;margin-bottom:6px;
    cursor:pointer;
    transition:transform .1s,background .15s;
  }
  .choice:active{transform:scale(.97);background:rgba(255,255,255,.14);}
  .choice-icon{
    width:34px;height:34px;flex-shrink:0;
    border-radius:10px;
    display:flex;align-items:center;justify-content:center;
    font-size:18px;
  }
  .ci-pos{background:linear-gradient(135deg,rgba(124,197,118,.45),rgba(93,202,165,.45));}
  .ci-neg{background:linear-gradient(135deg,rgba(226,75,74,.45),rgba(199,56,56,.45));}
  .ci-mix{background:linear-gradient(135deg,rgba(239,159,39,.45),rgba(255,122,92,.45));}
  .ci-neu{background:linear-gradient(135deg,rgba(175,169,236,.4),rgba(127,119,221,.4));}
  .choice-txt{flex:1;font-size:13.5px;font-weight:500;color:#fff;line-height:1.25;}
  .choice-arrow{color:rgba(255,255,255,.4);font-size:18px;}

  .toast{
    position:fixed;top:140px;left:50%;
    transform:translateX(-50%) translateY(-10px);
    padding:10px 16px;
    background:rgba(0,0,0,.78);
    border-radius:20px;
    border:1.5px solid #fff;
    font-size:13px;font-weight:600;
    opacity:0;pointer-events:none;
    transition:opacity .25s,transform .25s;
    z-index:100;white-space:nowrap;
  }
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

  .summary-icon{
    display:inline-block;padding:6px;
    background:linear-gradient(135deg,#FFB347 0%,#FF7A5C 100%);
    border-radius:50%;
    box-shadow:0 0 30px rgba(255,122,92,.4);
  }
  .summary-icon-inner{
    width:96px;height:96px;
    background:#fff;border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    font-size:54px;line-height:1;
  }
  .delta-num{font-size:48px;font-weight:700;line-height:1;text-align:center;margin:6px 0;}
  .delta-pos{color:#7CC576;}
  .delta-neg{color:#E24B4A;}
  .delta-zero{color:#AFA9EC;}

  .log-row{
    display:flex;align-items:flex-start;gap:8px;
    padding:6px 0;
    border-bottom:1px dashed rgba(255,255,255,.08);
  }
  .log-row:last-child{border-bottom:none;}
  .log-time{width:56px;flex-shrink:0;font-size:11px;color:rgba(255,255,255,.5);font-weight:500;}
  .log-text{flex:1;font-size:12px;color:#fff;line-height:1.4;}
  .log-dir{font-size:12px;font-weight:600;flex-shrink:0;}
  .log-pos{color:#7CC576;}
  .log-neg{color:#E24B4A;}

  .center{text-align:center;}
  .mb-s{margin-bottom:8px;}
  .mb-m{margin-bottom:14px;}
  .mb-l{margin-bottom:24px;}
  .mt-s{margin-top:8px;}
  .mt-m{margin-top:14px;}
  .mt-l{margin-top:24px;}
  .gap-l{height:32px;}
  .pad-l{padding:18px;}

  .icon-btn{
    background:none;border:none;
    color:rgba(255,255,255,.7);
    width:40px;height:40px;
    display:flex;align-items:center;justify-content:center;
    cursor:pointer;font-size:20px;
  }
  .top-nav{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
  .step-pill{font-size:12px;color:rgba(255,255,255,.5);font-weight:500;}

  .bullet-row{display:flex;align-items:center;gap:12px;padding:6px 0;}
  .bullet-emoji{font-size:22px;}
  .bullet-text{font-size:14px;font-weight:500;}

  .toolbar{
    display:flex;justify-content:center;gap:6px;
    margin-top:10px;flex-wrap:wrap;
  }
  .toolbar button{
    background:rgba(255,255,255,.05);
    border:1px solid rgba(255,255,255,.08);
    color:rgba(255,255,255,.45);
    font:500 11px inherit;
    padding:4px 10px;border-radius:10px;
    cursor:pointer;
  }
  .toolbar button:active{background:rgba(255,255,255,.12);}

  .sticky-cta{
    position:fixed;
    left:0;right:0;
    bottom:0;
    padding:18px 14px max(18px, calc(env(safe-area-inset-bottom) + 14px));
    background:linear-gradient(180deg, rgba(26,16,51,0) 0%, rgba(26,16,51,.85) 35%, rgba(26,16,51,.96) 100%);
    backdrop-filter:blur(8px);
    -webkit-backdrop-filter:blur(8px);
    z-index:50;
    pointer-events:none;
  }
  .sticky-cta > *{pointer-events:auto;}
  .sticky-cta-inner{max-width:440px;margin:0 auto;}
  .summary-bottom-pad{height:110px;}
</style>
</head>

function lifestyleKey(){
  if (S.ageGroup === "minor")  return "minor";

}

function defaultState(){
  return {
    phase:"intro",
    name:"",

    day:1,
    slotIdx:0,
    daySlots:[],
    recentEventTitles:[],
    direction:0,
    dayStartDir:0,
    money:200,
    health:70,
    happy:70,
    smarts:50,
    social:50,
    job:"Student",
    relationship:"Single",
    log:[],
  };
}

function load(){
  try {
    const raw = localStorage.getItem(SAVE_KEY);
    if (!raw) return null;
    const parsed = JSON.parse(raw);
    return Object.assign(defaultState(), parsed);
  } catch (e) { return null; }
}

function save(){
  try {
    const toSave = Object.assign({}, S);
    delete toSave.daySlots;
    localStorage.setItem(SAVE_KEY, JSON.stringify(toSave));
  } catch(e){}
}

function clearSave(){
  try { localStorage.removeItem(SAVE_KEY); } catch(e){}
}

function clamp(v,lo,hi){ return v<lo?lo:(v>hi?hi:v); }

function applyEffect(e){
  if (!e) return;
  S.direction = clamp(S.direction + (e.dir||0), -100, 100);
  S.money     = clamp(S.money     + (e.money||0), -999, 999999);
  S.health    = clamp(S.health    + (e.health||0), 0, 100);
  S.happy     = clamp(S.happy     + (e.happy||0), 0, 100);
  S.smarts    = clamp(S.smarts    + (e.smarts||0), 0, 100);
  S.social    = clamp(S.social    + (e.social||0), 0, 100);
}

function applyTrait(){
  switch(S.traitId){
    case "kind":  S.social = clamp(S.social + 15, 0, 100); break;
    case "smart": S.smarts = clamp(S.smarts + 15, 0, 100); break;
    case "fit":   S.health = clamp(S.health + 15, 0, 100); break;
    case "lucky":
      S.social = clamp(S.social + 10, 0, 100);
      S.smarts = clamp(S.smarts + 10, 0, 100);
      S.health = clamp(S.health + 10, 0, 100);
      S.happy  = clamp(S.happy  + 10, 0, 100);
      break;
  }
}

function dirLabel(d){
  if (d < -60) return "Spiraling";
  if (d < -25) return "Struggling";
  if (d < -8)  return "A bit rough";
  if (d <= 8)  return "Steady";
  if (d <= 25) return "Going well";
  if (d <= 60) return "Thriving";
  return "Living the dream";
}

function dirDot(d){
  if (d < -25) return "#FF3B47";
  if (d < -8)  return "#FF9D2E";
  if (d <= 8)  return "#AFA9EC";
  if (d <= 25) return "#5FE07A";
  return "#00C77C";
}

function avatarEmoji(){
  const a = AVATARS.find(x=>x.id===S.avatarId);
  return a ? a.emoji : "🙂";
}

function buildDay(){
  const lifestyle = lifestyleKey();
  const pools = LIFESTYLE_POOLS[lifestyle] || LIFESTYLE_POOLS.job;
  const slots = [];
  // Track categories used so far in THIS day to encourage variety within the day
  const todayCats = new Set();
  // recentEventTitles persists across days - last ~25 event titles seen
  const recent = new Set(S.recentEventTitles || []);

  for (const t of TIME_SLOTS) {
    const pool = pools[t.label] || pools.Afternoon || [];
    if (pool.length === 0) {
      // Fallback to job pool if a slot is empty for this lifestyle
      const fallback = LIFESTYLE_POOLS.job[t.label] || LIFESTYLE_POOLS.job.Afternoon;
      slots.push({time:t.time, label:t.label, event: fallback[Math.floor(Math.random()*fallback.length)]});
      continue;
    }
    // Score each event: prefer events with categories not already in today, and titles not recently seen
    const scored = pool.map(ev => {
      let score = Math.random(); // base randomness
      if (ev.cat && !todayCats.has(ev.cat)) score += 1.5; // big boost for new category today
      if (!recent.has(ev.title)) score += 0.6; // boost for fresh titles
      return {ev, score};
    });
    scored.sort((a,b) => b.score - a.score);
    const chosen = scored[0].ev;
    if (chosen.cat) todayCats.add(chosen.cat);
    slots.push({time:t.time, label:t.label, event:chosen});
  }
  S.daySlots = slots;
  // Update recent titles list - keep last 25
  const newRecent = slots.map(s => s.event.title);
  S.recentEventTitles = (newRecent.concat(S.recentEventTitles || [])).slice(0, 25);
  if (S.slotIdx === 0) S.dayStartDir = S.direction;
}

function showToast(msg, color){
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.style.borderColor = color || "#fff";
  t.style.boxShadow = "0 0 12px " + (color||"#fff") + "55";
  t.classList.add("show");
  clearTimeout(t._timer);
  t._timer = setTimeout(()=>t.classList.remove("show"), 1300);
}

function el(tag, attrs, children){
  const e = document.createElement(tag);
  if (attrs) {
    for (const k in attrs) {
      if (k === "class") e.className = attrs[k];
      else if (k === "html") e.innerHTML = attrs[k];
      else if (k.startsWith("on")) e.addEventListener(k.slice(2).toLowerCase(), attrs[k]);
      else if (k === "style" && typeof attrs[k] === "object") Object.assign(e.style, attrs[k]);
      else e.setAttribute(k, attrs[k]);
    }
  }
  if (children) {
    if (typeof children === "string") e.textContent = children;
    else if (Array.isArray(children)) children.forEach(c => c && e.appendChild(typeof c === "string" ? document.createTextNode(c) : c));
    else e.appendChild(children);
  }
  return e;
}

function render(){
  const app = document.getElementById("app");
  app.innerHTML = "";
  switch(S.phase){
    case "intro":      renderIntro(app); break;
    case "name":       renderName(app); break;
    case "avatar":     renderAvatar(app); break;
    case "trait":      renderTrait(app); break;
    case "age":        renderAge(app); break;
    case "occupation": renderOccupation(app); break;
    case "play":       renderPlay(app); break;
    case "daySummary": renderDaySummary(app); break;
  }
  window.scrollTo(0, 0);
}

    const v = input.value.trim();
    if(!v){ showToast("Please enter a name", "#EF9F27"); return; }

  app.appendChild(el("button", {class:"btn-primary", onclick:next}, [el("span",null,"Continue"), el("span",null,"→")]));

  app.appendChild(el("div", {class:"top-nav"}, [
    el("button", {class:"icon-btn", onclick:()=>{ S.phase="name"; render(); }}, "←"),
    el("span", {class:"step-pill"}, "Step 2"),
  ]));
  app.appendChild(el("div", {class:"gap-l"}));
  app.appendChild(el("h1", {class:"h1 mb-s"}, "Hi, " + S.name + "!"));
  app.appendChild(el("div", {class:"text-sec mb-l"}, "Pick your character."));
  const grid = el("div", {class:"pick-grid mb-l", style:{gridTemplateColumns:"1fr 1fr 1fr"}});
  AVATARS.forEach(a=>{
    const cls = "pick" + (S.avatarId===a.id ? " selected" : "");
    grid.appendChild(el("div", {class:cls, style:{padding:"14px 4px"}, onclick:()=>{ S.avatarId = a.id; render(); }}, [
      el("div", {class:"pick-emoji", style:{fontSize:"42px"}}, a.emoji),
      el("div", {class:"pick-label"}, a.label),
    ]));
  });
  app.appendChild(grid);
  app.appendChild(el("button", {class:"btn-primary", onclick:()=>{
    if(!S.avatarId){ showToast("Pick a character", "#EF9F27"); return; }
    S.phase = "trait"; render();
  }}, [el("span",null,"Continue"), el("span",null,"→")]));
}

function renderTrait(app){
  app.appendChild(el("div", {class:"top-nav"}, [
    el("button", {class:"icon-btn", onclick:()=>{ S.phase="avatar"; render(); }}, "←"),
    el("span", {class:"step-pill"}, "Step 3"),
  ]));
  app.appendChild(el("div", {class:"gap-l"}));
  app.appendChild(el("h1", {class:"h1 mb-s"}, "Pick a starting trait"));
  app.appendChild(el("div", {class:"text-sec mb-l"}, "A small head start in life."));
  const grid = el("div", {class:"pick-grid mb-l"});
  TRAITS.forEach(t=>{
    const cls = "pick teal" + (S.traitId===t.id ? " selected" : "");
    grid.appendChild(el("div", {class:cls, onclick:()=>{ S.traitId = t.id; render(); }}, [
      el("div", {class:"pick-emoji", style:{fontSize:"40px"}}, t.emoji),
      el("div", {class:"pick-label"}, t.label),
      el("div", {class:"pick-desc"}, t.desc),
    ]));
  });
  app.appendChild(grid);
  app.appendChild(el("button", {class:"btn-primary", onclick:()=>{
    if(!S.traitId){ showToast("Pick a trait", "#EF9F27"); return; }
    applyTrait();
    S.phase = "age";
    render();
  }}, [el("span",null,"Continue"), el("span",null,"→")]));
}

function renderAge(app){
  app.appendChild(el("div", {class:"top-nav"}, [
    el("button", {class:"icon-btn", onclick:()=>{ S.phase="trait"; render(); }}, "←"),
    el("span", {class:"step-pill"}, "Step 4"),
  ]));
  app.appendChild(el("div", {class:"gap-l"}));
  app.appendChild(el("h1", {class:"h1 mb-s"}, "Your age group?"));
  app.appendChild(el("div", {class:"text-sec mb-l"}, "This shapes the rhythm of your day."));
  const list = el("div", {style:{display:"flex", flexDirection:"column", gap:"10px"}});
  AGE_GROUPS.forEach(a=>{
    const isSel = S.ageGroup===a.id;
    const card = el("div", {
      class: "pick" + (isSel ? " selected" : ""),
      style: {textAlign:"left", padding:"14px 16px", display:"flex", alignItems:"center", gap:"14px"},
      onclick: ()=>{ S.ageGroup = a.id; render(); }
    }, [
      el("div", {style:{fontSize:"36px", lineHeight:"1"}}, a.emoji),
      el("div", {style:{flex:"1"}}, [
        el("div", {class:"pick-label", style:{textAlign:"left", margin:"0 0 2px"}}, a.label),
        el("div", {class:"pick-desc", style:{textAlign:"left", margin:"0"}}, a.desc),
      ]),
    ]);
    list.appendChild(card);
  });
  app.appendChild(list);
  app.appendChild(el("div", {class:"gap-l"}));
  app.appendChild(el("button", {class:"btn-primary", onclick:()=>{
    if(!S.ageGroup){ showToast("Pick an age group", "#EF9F27"); return; }
    if (S.ageGroup === "adult") {
      S.phase = "occupation";
    } else {
      // Minor or senior - skip occupation, jump to play
      buildDay();
      S.phase = "play";
      save();
    }
    render();
  }}, [el("span",null, S.ageGroup === "adult" ? "Continue" : "Begin day 1"), el("span",null, S.ageGroup === "adult" ? "→" : "▶")]));
}

function renderOccupation(app){
  app.appendChild(el("div", {class:"top-nav"}, [
    el("button", {class:"icon-btn", onclick:()=>{ S.phase="age"; render(); }}, "←"),
    el("span", {class:"step-pill"}, "Step 5"),
  ]));
  app.appendChild(el("div", {class:"gap-l"}));
  app.appendChild(el("h1", {class:"h1 mb-s"}, "What do you do?"));
  app.appendChild(el("div", {class:"text-sec mb-l"}, "Your daily life will revolve around this."));
  const list = el("div", {style:{display:"flex", flexDirection:"column", gap:"10px"}});
  OCCUPATIONS.forEach(o=>{
    const isSel = S.occupation===o.id;
    const card = el("div", {
      class: "pick" + (isSel ? " selected" : ""),
      style: {textAlign:"left", padding:"14px 16px", display:"flex", alignItems:"center", gap:"14px"},
      onclick: ()=>{ S.occupation = o.id; render(); }
    }, [
      el("div", {style:{fontSize:"36px", lineHeight:"1"}}, o.emoji),
      el("div", {style:{flex:"1"}}, [
        el("div", {class:"pick-label", style:{textAlign:"left", margin:"0 0 2px"}}, o.label),
        el("div", {class:"pick-desc", style:{textAlign:"left", margin:"0"}}, o.desc),
      ]),
    ]);
    list.appendChild(card);
  });
  app.appendChild(list);
  app.appendChild(el("div", {class:"gap-l"}));
  app.appendChild(el("button", {class:"btn-primary", onclick:()=>{
    if(!S.occupation){ showToast("Pick an option", "#EF9F27"); return; }
    buildDay();
    S.phase = "play";
    save();
    render();
  }}, [el("span",null,"Begin day 1"), el("span",null,"▶")]));
}

function renderPlay(app){
  if (S.daySlots.length !== 10) buildDay();
  const slot = S.daySlots[S.slotIdx];
  const ev = slot.event;
  const needlePct = ((S.direction + 100) / 200) * 100;
  const dirColor = dirDot(S.direction);

  app.appendChild(el("div", {class:"top-row"}, [
    el("div", {class:"day-chip"}, [
      el("span", {style:{color:"#FFB347"}}, "📅"),
      el("span", null, "Day " + S.day + " · " + (S.slotIdx+1) + "/10")
    ]),
  ]));

  const meter = el("div", {class:"glass meter-card"}, [
    el("div", {class:"meter-head"}, [
      el("div", {class:"label-tiny"}, "LIFE DIRECTION"),
      el("div", {class:"meter-status"}, [
        el("div", {class:"meter-dot", style:{background:dirColor, boxShadow:"0 0 10px "+dirColor}}),
        el("span", null, dirLabel(S.direction))
      ])
    ]),
    el("div", {class:"meter-track"}, [
      el("div", {class:"meter-needle", style:{left:"calc("+needlePct.toFixed(1)+"% - 2px)"}}),
    ]),
    el("div", {class:"meter-foot"}, [
      el("span",{class:"text-faint"},"Bad"),
      el("span",{class:"text-faint"},"Neutral"),
      el("span",{class:"text-faint"},"Great"),
    ]),
  ]);
  app.appendChild(meter);

  const dots = el("div", {class:"progress"});
  for (let i=0; i<10; i++) {
    const cls = i < S.slotIdx ? "pdot done" : (i === S.slotIdx ? "pdot now" : "pdot");
    dots.appendChild(el("div", {class:cls}));
  }
  app.appendChild(dots);

  app.appendChild(el("div", {class:"stats"}, [
    statTile("❤️", S.health, "Health"),
    statTile("😊", S.happy, "Happy"),
    statTile("🧠", S.smarts, "Brain"),
    statTile("💰", "$"+S.money, "Money"),
  ]));

  app.appendChild(el("div", {class:"scene"}, [
    el("div", {class:"scene-inner"}, [
      el("div", {class:"scene-time"}, [
        el("span", {class:"time-clock"}, slot.time),
        el("span", null, slot.label),
      ]),
      el("div", null, el("div", {class:"avatar-ring"}, el("div", {class:"avatar"}, avatarEmoji()))),
      el("div", {class:"scene-title"}, ev.title),
      el("div", {class:"scene-desc"}, ev.desc),
    ])
  ]));

  ev.choices.forEach(c=>{
    const ic = "choice-icon ci-" + (c.tone || "neu");
    app.appendChild(el("div", {class:"choice", onclick:()=>onChoice(c, ev, slot)}, [
      el("div", {class:ic}, c.emoji),
      el("div", {class:"choice-txt"}, c.label),
      el("div", {class:"choice-arrow"}, "›"),
    ]));
  });

  app.appendChild(el("div", {class:"toolbar"}, [
    el("button", {onclick:()=>{ if(confirm("Start a new life? This erases your current progress.")){ clearSave(); S = defaultState(); S.phase="intro"; render(); } }}, "↺ New life"),
    el("button", {onclick:()=>{ S.phase="intro"; render(); }}, "← Home"),
  ]));
}

function statTile(icon, val, label){
  return el("div", {class:"stat"}, [
    el("div", {class:"stat-icon"}, icon),
    el("div", {class:"stat-val"}, String(val)),
    el("div", {class:"stat-lbl"}, label),
  ]);
}

function onChoice(choice, ev, slot){
  applyEffect(choice.e);
  S.log.unshift({day:S.day, time:slot.time, text: ev.title + " → " + choice.label, dir:(choice.e&&choice.e.dir)||0});
  if (S.log.length > 100) S.log.pop();
  const d = (choice.e && choice.e.dir) || 0;
  if (d > 0) showToast("+" + d + " life ✨", "#7CC576");
  else if (d < 0) showToast(d + " life 💔", "#E24B4A");
  else showToast("No change", "#AFA9EC");
  S.slotIdx += 1;
  save();
  if (S.slotIdx >= 10) {
    setTimeout(()=>{ S.phase = "daySummary"; render(); }, 350);
  } else {
    setTimeout(render, 300);
  }
}

function renderDaySummary(app){
  const delta = S.direction - S.dayStartDir;
  const moonEmoji = delta > 15 ? "🌟" : delta > 5 ? "✨" : delta < -15 ? "🌧️" : delta < -5 ? "☁️" : "🌙";
  const verdict = delta > 15 ? "A wonderful day! Keep it up." :
                  delta > 5  ? "A good day overall." :
                  delta < -15? "A really rough day." :
                  delta < -5 ? "A bumpy day." : "A pretty steady day.";
  const deltaCls = delta > 5 ? "delta-pos" : delta < -5 ? "delta-neg" : "delta-zero";

  app.appendChild(el("div", {class:"gap-l"}));
  app.appendChild(el("div", {class:"center mb-m"}, [
    el("div", {class:"summary-icon"}, el("div", {class:"summary-icon-inner"}, moonEmoji))
  ]));
  app.appendChild(el("h2", {class:"h2 center mb-s"}, "Day " + S.day + " complete"));
  app.appendChild(el("div", {class:"text-mut center"}, "Life-meter change today"));
  app.appendChild(el("div", {class:"delta-num " + deltaCls}, (delta>0?"+":"") + delta));
  app.appendChild(el("div", {class:"text-sec center mb-s"}, verdict));
  app.appendChild(el("div", {class:"center mb-l"}, [
    el("span", {class:"text-mut"}, "Now at: "),
    el("span", {style:{fontWeight:"600",color:"#fff"}}, dirLabel(S.direction)),
  ]));

  app.appendChild(el("div", {class:"stats"}, [
    statTile("❤️", S.health, "Health"),
    statTile("😊", S.happy, "Happy"),
    statTile("🧠", S.smarts, "Brain"),
    statTile("💰", "$"+S.money, "Money"),
  ]));

  app.appendChild(el("div", {class:"label-tiny mb-s mt-l", style:{paddingLeft:"4px"}}, "TODAY'S CHOICES"));
  const todays = S.log.filter(l => l.day === S.day);
  const logBox = el("div", {class:"glass", style:{padding:"10px 14px"}});
  if (todays.length === 0) {
    logBox.appendChild(el("div", {class:"text-mut"}, "No choices logged."));
  } else {
    todays.slice().reverse().forEach(l=>{
      const dirCls = l.dir > 0 ? "log-dir log-pos" : l.dir < 0 ? "log-dir log-neg" : "log-dir";
      const row = el("div", {class:"log-row"}, [
        el("div", {class:"log-time"}, l.time),
        el("div", {class:"log-text"}, l.text),
      ]);
      if (l.dir !== 0) row.appendChild(el("div", {class:dirCls}, (l.dir>0?"+":"") + l.dir));
      logBox.appendChild(row);
    });
  }
  app.appendChild(logBox);

  app.appendChild(el("div", {class:"summary-bottom-pad"}));
  app.appendChild(el("div", {class:"sticky-cta"},
    el("div", {class:"sticky-cta-inner"},
      el("div", {class:"cta-row"}, [
        el("button", {class:"btn-secondary", onclick:()=>{
          S.day += 1;
          S.slotIdx = 0;
          S.daySlots = [];
          save();
          S.phase = "intro";
          render();
        }, "aria-label":"Go to home"}, [
          el("span", {style:{fontSize:"18px",lineHeight:"1"}}, "🏠"),
          el("span", null, "Home"),
        ]),
        el("button", {class:"btn-primary", onclick:()=>{
          S.day += 1;
          S.slotIdx = 0;
          S.daySlots = [];
          buildDay();
          S.phase = "play";
          save();
          render();
        }}, [el("span", null, "Sleep & start day " + (S.day+1)), el("span", null, "🌙")]),
      ])
    )
  ));
}

const loaded = load();
if (loaded && loaded.name) {
  S = loaded;
  S.phase = "intro";
  if (S.daySlots) S.daySlots = [];
} else {
  S = defaultState();
}
render();
</script>
</body>
</html>
